<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gentleman of Marketing - AI Dashboard</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Lucide Icons for React -->
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

    <style>
        body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState } = React;
        const { 
          Menu, X, LayoutDashboard, MessageSquare, Star, Share2, Search, Mail, 
          TrendingUp, Users, Workflow, PhoneCall, Bot, CheckCircle2, Calendar, 
          BarChart3, ChevronRight, ShieldCheck, Megaphone 
        } = lucideReact;

        // Brand Colors
        const COLORS = {
          gold: '#a98a66',
          black: '#000000',
          white: '#ffffff',
          grayBg: '#f9f9f9',
          grayBorder: '#eaeaea'
        };

        const Card = ({ children, className = '' }) => (
          <div className={`bg-white border border-[#eaeaea] shadow-sm rounded-xl p-6 ${className}`}>
            {children}
          </div>
        );

        const StatBadge = ({ icon: Icon, label, value, trend }) => (
          <Card className="flex items-center space-x-4 border-l-4" style={{ borderLeftColor: COLORS.gold }}>
            <div className="p-3 rounded-lg" style={{ backgroundColor: `${COLORS.gold}20`, color: COLORS.gold }}>
              <Icon size={24} />
            </div>
            <div>
              <p className="text-sm text-gray-500 font-medium">{label}</p>
              <div className="flex items-center space-x-2">
                <h3 className="text-2xl font-bold" style={{ color: COLORS.black }}>{value}</h3>
                {trend && <span className="text-sm font-semibold text-green-600">{trend}</span>}
              </div>
            </div>
          </Card>
        );

        // --- VIEWS ---

        const DashboardOverview = () => (
          <div className="space-y-6 flex-1">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
              <div>
                <h1 className="text-3xl font-bold mb-2" style={{ color: COLORS.black }}>AI Workforce Command Center</h1>
                <p className="text-gray-600">Never Miss a Client Who's Ready to Book</p>
              </div>
              <button className="mt-4 md:mt-0 px-6 py-2 rounded-lg font-bold transition-colors text-white" style={{ backgroundColor: COLORS.gold }}>
                Deploy New AI Agent
              </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <StatBadge icon={PhoneCall} label="Calls Handled (24/7)" value="1,248" trend="+14%" />
              <StatBadge icon={TrendingUp} label="Lead-to-Revenue" value="+372%" trend="AI Driven" />
              <StatBadge icon={Star} label="Avg Review Rating" value="4.8/5" trend="+0.2" />
              <StatBadge icon={Calendar} label="Appointments Booked" value="342" trend="+28%" />
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
              <Card className="lg:col-span-2">
                <h3 className="text-xl font-bold mb-4 flex items-center" style={{ color: COLORS.black }}>
                  <Workflow className="mr-2" style={{ color: COLORS.gold }} /> The Customer Journey Funnel
                </h3>
                <div className="space-y-4">
                  {[
                    { stage: 'Awareness', desc: 'Targeted digital strategies & social content', icon: Megaphone, pct: '100%' },
                    { stage: 'Findability', desc: 'SEO & local listing management', icon: Search, pct: '85%' },
                    { stage: 'Reputation', desc: 'Social proof, reviews, & online image', icon: Star, pct: '65%' },
                    { stage: 'Conversion', desc: 'Optimized landing pages & AI booking', icon: TrendingUp, pct: '42%' },
                    { stage: 'Advocacy', desc: 'Referrals, loyalty, & repeat business', icon: Users, pct: '28%' }
                  ].map((item, i) => (
                    <div key={i} className="flex items-center">
                      <div className="w-1/4 pr-4 text-right">
                        <span className="font-bold text-sm" style={{ color: COLORS.black }}>{item.stage}</span>
                      </div>
                      <div className="flex-1 bg-gray-100 rounded-full h-8 relative overflow-hidden flex items-center">
                        <div 
                          className="absolute top-0 left-0 h-full flex items-center pl-4 transition-all duration-1000"
                          style={{ width: item.pct, backgroundColor: COLORS.gold }}
                        >
                          <item.icon size={16} className="text-white opacity-80" />
                        </div>
                        <span className="relative z-10 pl-12 text-xs font-semibold text-gray-800 hidden md:block">
                          {item.desc}
                        </span>
                      </div>
                      <div className="w-16 text-right font-bold text-sm" style={{ color: COLORS.gold }}>{item.pct}</div>
                    </div>
                  ))}
                </div>
              </Card>

              <Card>
                <h3 className="text-xl font-bold mb-4 flex items-center" style={{ color: COLORS.black }}>
                  <Bot className="mr-2" style={{ color: COLORS.gold }} /> Active AI Employees
                </h3>
                <ul className="space-y-4">
                  {[
                    { role: 'AI Receptionist', status: 'Online 24/7', detail: 'Handling Voice & Web Chat' },
                    { role: 'AI Inside Salesperson', status: 'Online', detail: 'Qualifying Leads' },
                    { role: 'AI Reputation Specialist', status: 'Active', detail: 'Monitoring Reviews' },
                    { role: 'AI Content Creator', status: 'Scheduled', detail: 'Next post in 2 hrs' }
                  ].map((agent, i) => (
                    <li key={i} className="flex items-start p-3 rounded-lg bg-gray-50 border border-gray-100">
                      <div className="mt-1 mr-3 h-2 w-2 rounded-full bg-green-500"></div>
                      <div>
                        <p className="font-bold text-sm" style={{ color: COLORS.black }}>{agent.role}</p>
                        <p className="text-xs text-gray-500">{agent.detail}</p>
                      </div>
                    </li>
                  ))}
                </ul>
              </Card>
            </div>
          </div>
        );

        const ConversationsView = () => (
          <div className="space-y-6">
            <div className="mb-6">
              <h2 className="text-2xl font-bold" style={{ color: COLORS.black }}>Conversations AI Premium</h2>
              <p className="text-gray-600">Omnichannel inbox & 24/7 AI Receptionist</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <Card className="lg:col-span-2">
                <h3 className="text-lg font-bold mb-4">Live AI Interactions</h3>
                <div className="bg-gray-50 rounded-xl border border-gray-200 h-96 flex flex-col overflow-hidden">
                  <div className="p-4 border-b border-gray-200 bg-white flex justify-between items-center">
                    <div className="flex items-center">
                      <div className="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center mr-3 font-bold text-white overflow-hidden">
                        <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah`} alt="avatar" />
                      </div>
                      <div>
                        <p className="font-bold text-sm">Sarah Jenkins <span className="text-xs font-normal text-gray-500 ml-2">Web Chat Lead</span></p>
                        <p className="text-xs text-green-600 font-semibold">● Online</p>
                      </div>
                    </div>
                    <span className="text-xs bg-black text-white px-2 py-1 rounded">AI Handled</span>
                  </div>
                  <div className="flex-1 p-4 overflow-y-auto space-y-4">
                    <div className="flex justify-start">
                      <div className="bg-white border border-gray-200 text-black text-sm p-3 rounded-tr-xl rounded-br-xl rounded-bl-xl shadow-sm max-w-[80%]">
                        Hi, do you have any availability for a facial this weekend? I know it's 9 PM so you might be closed...
                        <p className="text-[10px] text-gray-400 mt-1">Today, 9:02 PM</p>
                      </div>
                    </div>
                    <div className="flex justify-end">
                      <div className="text-white text-sm p-3 rounded-tl-xl rounded-bl-xl rounded-br-xl shadow-sm max-w-[80%]" style={{ backgroundColor: COLORS.gold }}>
                        Hi Sarah! Thanks for reaching out about a facial. We'd love to help you feel your best. We have a few spots open this Saturday at 10:00 AM or 2:00 PM. Would you like to reserve one of those?
                        <p className="text-[10px] text-white/70 mt-1">Today, 9:02 PM • Sent by AI</p>
                      </div>
                    </div>
                  </div>
                </div>
              </Card>
              
              <div className="space-y-6">
                <Card>
                  <h3 className="text-lg font-bold mb-4">Missed Call Recovery</h3>
                  <div className="text-center py-6">
                    <p className="text-5xl font-bold" style={{ color: COLORS.gold }}>84%</p>
                    <p className="text-sm text-gray-500 mt-2">of missed calls converted via automated SMS recovery this month.</p>
                  </div>
                </Card>
                <Card>
                  <h3 className="text-lg font-bold mb-4">Channels Monitored</h3>
                  <ul className="space-y-3">
                    {['Phone Calls', 'Web Chat', 'SMS / Text', 'WhatsApp', 'Facebook Messenger', 'Instagram DMs'].map(channel => (
                      <li key={channel} className="flex justify-between items-center text-sm border-b border-gray-100 pb-2 last:border-0 last:pb-0">
                        <span className="flex items-center"><CheckCircle2 size={16} className="mr-2 text-green-500"/> {channel}</span>
                        <span className="font-bold" style={{ color: COLORS.gold }}>Active</span>
                      </li>
                    ))}
                  </ul>
                </Card>
              </div>
            </div>
          </div>
        );

        const WorkflowsView = () => (
          <div className="space-y-6">
            <div className="mb-6">
              <h2 className="text-2xl font-bold" style={{ color: COLORS.black }}>AI-Powered Workflows</h2>
              <p className="text-gray-600">Turn Leads into Loyal Customers automatically</p>
            </div>

            <div className="grid grid-cols-1 gap-6">
              {[
                { name: 'Attract', icon: MessageSquare, scenario: 'AI-generated follow-up for web chat leads (e.g., late night inquiries).', tips: 'Update AI prompt to match typical inquiries.' },
                { name: 'Convert & Engage', icon: CheckCircle2, scenario: 'After live chat, system sends SMS/Email, logs in CRM, and creates reminder task.', tips: 'Tag leads by service type ("Massage Inquiry").' },
                { name: 'Retain', icon: Mail, scenario: 'Client books first visit. Instantly added to wellness campaign for monthly tips/offers.', tips: 'Use campaigns like "Glow-Up Guide".' },
                { name: 'Nurture', icon: Workflow, scenario: 'Client inquires but doesn\'t book. 3 days later, AI sends thoughtful check-in message.', tips: 'Trigger when opp moves to "Pending Booking".' },
                { name: 'Reputation', icon: Star, scenario: 'After service is marked complete, client receives friendly SMS/email asking for review.', tips: 'Trigger on task "Appointment Complete".' }
              ].map((flow, i) => (
                <Card key={i} className="flex flex-col md:flex-row items-start gap-6 hover:border-[#a98a66] transition-colors cursor-pointer group">
                  <div className="p-4 rounded-xl flex-shrink-0" style={{ backgroundColor: `${COLORS.black}`, color: COLORS.gold }}>
                    <flow.icon size={32} />
                  </div>
                  <div className="flex-1">
                    <h3 className="text-xl font-bold mb-2 group-hover:text-[#a98a66] transition-colors" style={{ color: COLORS.black }}>{flow.name} Automation</h3>
                    <p className="text-gray-700 mb-3 text-sm"><strong>Scenario:</strong> {flow.scenario}</p>
                    <div className="bg-gray-50 p-3 rounded border border-gray-100 text-sm">
                      <span className="font-semibold text-gray-500">Customization Tip:</span> {flow.tips}
                    </div>
                  </div>
                  <div className="hidden md:flex flex-col justify-center items-center h-full px-4 text-gray-300 group-hover:text-[#a98a66] transition-colors">
                    <ChevronRight size={32} />
                  </div>
                </Card>
              ))}
            </div>
          </div>
        );

        const ReputationView = () => (
          <div className="space-y-6">
            <div className="mb-6">
              <h2 className="text-2xl font-bold" style={{ color: COLORS.black }}>Reputation AI & SEO Pro</h2>
              <p className="text-gray-600">Grow visibility and win customers with AI insights</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
              <StatBadge icon={Star} label="Google Rating" value="4.9" trend="128 Reviews" />
              <StatBadge icon={ShieldCheck} label="Listings Synced" value="45/45" trend="100% Accurate" />
              <StatBadge icon={Search} label="Local SEO Rank" value="Top 3" trend="Map Pack" />
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <Card>
                <h3 className="text-lg font-bold mb-4 flex justify-between items-center">
                  Recent Reviews 
                  <span className="text-xs bg-gray-100 px-2 py-1 rounded text-gray-600">AI Auto-Respond: ON</span>
                </h3>
                <div className="space-y-4">
                  {[
                    { name: "Emily R.", rating: 5, text: "Amazing facial! The staff was incredibly welcoming and the booking process was seamless.", source: "Google" },
                    { name: "Michael T.", rating: 5, text: "Best massage I've had in years. Highly recommend this place.", source: "Yelp" },
                    { name: "Jessica W.", rating: 4, text: "Great service, though they were running about 5 minutes behind. Will definitely return.", source: "Facebook" }
                  ].map((review, i) => (
                    <div key={i} className="border-b border-gray-100 pb-4 last:border-0 last:pb-0">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <span className="font-bold text-sm" style={{ color: COLORS.black }}>{review.name}</span>
                          <div className="flex text-yellow-400 mt-1">
                            {[...Array(5)].map((_, j) => (
                              <Star key={j} size={12} fill={j < review.rating ? "currentColor" : "none"} />
                            ))}
                          </div>
                        </div>
                        <span className="text-xs font-semibold px-2 py-1 rounded bg-gray-100 text-gray-600">{review.source}</span>
                      </div>
                      <p className="text-sm text-gray-600 italic">"{review.text}"</p>
                      <div className="mt-2 text-xs font-semibold flex items-center" style={{ color: COLORS.gold }}>
                        <CheckCircle2 size={12} className="mr-1" /> AI Responded
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
              
              <Card>
                <h3 className="text-lg font-bold mb-4">Listing Sync Pro</h3>
                <p className="text-sm text-gray-600 mb-6">Your business information is locked and syncing across major platforms in real time.</p>
                
                <div className="space-y-4">
                  {[
                    { platform: "Google Business Profile", status: "Synced", icon: Search },
                    { platform: "Apple Maps", status: "Synced", icon: Search },
                    { platform: "Facebook", status: "Synced", icon: Share2 },
                    { platform: "Yelp", status: "Synced", icon: Star },
                    { platform: "Bing Places", status: "Synced", icon: Search }
                  ].map((listing, i) => (
                     <div key={i} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                       <div className="flex items-center">
                         <listing.icon size={18} className="mr-3 text-gray-400" />
                         <span className="font-semibold text-sm" style={{ color: COLORS.black }}>{listing.platform}</span>
                       </div>
                       <span className="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full flex items-center">
                         <CheckCircle2 size={12} className="mr-1" /> {listing.status}
                       </span>
                     </div>
                  ))}
                </div>
              </Card>
            </div>
          </div>
        );

        const App = () => {
          const [activeTab, setActiveTab] = useState('overview');
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

          const navItems = [
            { id: 'overview', label: 'Dashboard Overview', icon: LayoutDashboard },
            { id: 'conversations', label: 'Conversations AI', icon: MessageSquare },
            { id: 'reputation', label: 'Reputation & SEO', icon: Star },
            { id: 'workflows', label: 'AI Workflows', icon: Workflow },
            { id: 'social', label: 'Social Marketing', icon: Share2 },
            { id: 'crm', label: 'Sales CRM', icon: Users },
          ];

          const renderContent = () => {
            switch (activeTab) {
              case 'overview': return <DashboardOverview />;
              case 'conversations': return <ConversationsView />;
              case 'workflows': return <WorkflowsView />;
              case 'reputation': return <ReputationView />;
              default: return (
                <div className="flex flex-col items-center justify-center h-64 text-center">
                  <Bot size={48} style={{ color: COLORS.gold }} className="mb-4 opacity-50" />
                  <h2 className="text-xl font-bold" style={{ color: COLORS.black }}>Module Coming Soon</h2>
                  <p className="text-gray-500 mt-2">Select Overview, Conversations, Workflows, or Reputation.</p>
                </div>
              );
            }
          };

          return (
            <div className="min-h-screen font-sans flex" style={{ backgroundColor: COLORS.grayBg }}>
              
              {/* Mobile Nav Toggle */}
              <div className="md:hidden fixed top-0 left-0 right-0 h-16 bg-black z-50 flex items-center justify-between px-4">
                <div className="flex items-center">
                   <div className="w-8 h-8 rounded flex items-center justify-center font-serif font-bold text-black mr-2" style={{ backgroundColor: COLORS.gold }}>G</div>
                   <span className="text-white font-bold tracking-wider text-sm">GENTLEMAN OF MKTG</span>
                </div>
                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-white p-2">
                  {mobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              </div>

              {/* Sidebar */}
              <aside className={`
                fixed md:sticky top-0 left-0 z-40 h-screen transition-transform duration-300 ease-in-out
                w-64 flex flex-col shadow-2xl overflow-y-auto
                ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
              `} style={{ backgroundColor: COLORS.black }}>
                
                <div className="p-6 pb-2 hidden md:block">
                  <div className="flex items-center justify-center mb-6 pt-4">
                    <div className="w-12 h-12 rounded-full flex items-center justify-center font-serif font-bold text-2xl" style={{ backgroundColor: COLORS.gold, color: COLORS.black }}>
                      G
                    </div>
                  </div>
                  <div className="text-center mb-8">
                    <h2 className="font-bold text-white tracking-widest text-sm uppercase">The Gentleman</h2>
                    <p className="text-xs tracking-widest mt-1" style={{ color: COLORS.gold }}>Of Marketing</p>
                  </div>
                </div>

                <nav className="flex-1 px-4 mt-16 md:mt-0 space-y-2">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 px-2">Workspace</p>
                  {navItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => {
                        setActiveTab(item.id);
                        setMobileMenuOpen(false);
                      }}
                      className={`w-full flex items-center px-4 py-3 rounded-lg transition-all duration-200 text-sm font-medium ${
                        activeTab === item.id 
                          ? 'bg-white/10 text-white border-l-4' 
                          : 'text-gray-400 hover:bg-white/5 hover:text-white border-l-4 border-transparent'
                      }`}
                      style={activeTab === item.id ? { borderLeftColor: COLORS.gold } : {}}
                    >
                      <item.icon size={18} className={`mr-3 ${activeTab === item.id ? 'text-[#a98a66]' : 'text-gray-400'}`} style={activeTab === item.id ? { color: COLORS.gold } : {}}/>
                      {item.label}
                    </button>
                  ))}
                </nav>

                <div className="p-4 m-4 rounded-xl border" style={{ borderColor: 'rgba(169, 138, 102, 0.3)', backgroundColor: 'rgba(169, 138, 102, 0.1)' }}>
                  <div className="flex items-center mb-2">
                    <ShieldCheck size={16} className="mr-2" style={{ color: COLORS.gold }} />
                    <span className="text-sm font-bold text-white">System Status</span>
                  </div>
                  <p className="text-xs text-gray-400">All AI Agents operational and monitoring channels.</p>
                </div>
              </aside>

              {/* Main Content */}
              <main className="flex-1 w-full min-w-0 flex flex-col md:pt-0 pt-16 h-screen overflow-y-auto">
                <header className="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10 hidden md:flex">
                  <div className="text-sm text-gray-500 font-medium">
                    Dashboard / <span style={{ color: COLORS.gold }}>{navItems.find(i => i.id === activeTab)?.label}</span>
                  </div>
                  <div className="flex items-center space-x-4">
                    <button className="p-2 text-gray-400 hover:text-black rounded-full hover:bg-gray-100 transition-colors">
                      <Mail size={20} />
                    </button>
                    <div className="h-8 w-8 rounded-full bg-gray-200 border-2 overflow-hidden flex justify-center items-center font-bold text-xs" style={{ borderColor: COLORS.gold }}>
                      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="User" />
                    </div>
                  </div>
                </header>

                <div className="p-4 md:p-8 w-full max-w-7xl mx-auto">
                  {renderContent()}
                </div>
              </main>
            </div>
          );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
