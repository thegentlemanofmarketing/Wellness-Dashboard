                  <div className="h-4 rounded-full" style={{ width: '98%', backgroundColor: '#a98a66' }}></div>
                </div>
                <p className="text-sm font-bold text-gray-600 mb-6">98% Listing Accuracy Score</p>
                <button className="px-6 py-2 border border-black text-black font-bold rounded hover:bg-gray-50">View SEO Grid</button>
              </Card>
            );
          case 'crm':
            return (
              <Card className="flex flex-col items-center justify-center py-20 text-center">
                 <Users size={64} className="text-gray-300 mb-4" />
                <h2 className="text-2xl font-bold text-black mb-2">AI-Powered CRM</h2>
                <p className="text-gray-500 max-w-md mb-6">Automatically extracting meeting outcomes, tagging leads, and triggering personalized email & SMS campaigns.</p>
                <button className="px-6 py-2 text-white font-bold rounded" style={{ backgroundColor: 'black' }}>View Sales Pipeline</button>
              </Card>
            );
          default: return <OverviewView />;
        }
      };

      return (
        <div className="flex h-screen bg-gray-100 font-sans">
          
          {/* Mobile Menu Overlay */}
          {isMobileMenuOpen && (
            <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)} />
          )}

          {/* Sidebar */}
          <div className={`fixed inset-y-0 left-0 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 w-64 bg-black text-white transition-transform duration-200 ease-in-out z-50 flex flex-col`}>
            <div className="p-6 border-b border-gray-800">
              <h1 className="text-xl font-bold uppercase tracking-widest leading-tight" style={{ color: '#a98a66' }}>
                The Gentleman
                <span className="block text-white text-xs tracking-normal mt-1">OF MARKETING</span>
              </h1>
            </div>
            
            <div className="flex-1 overflow-y-auto py-6">
              <p className="px-6 text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">AI Workspace</p>
              <nav className="space-y-1">
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button
                      key={tab.id}
                      onClick={() => { setActiveTab(tab.id); setIsMobileMenuOpen(false); }}
                      className={`w-full flex items-center px-6 py-3 text-sm font-medium transition-colors border-l-4 ${
                        isActive 
                          ? 'bg-gray-900 border-[#a98a66] text-[#a98a66]' 
                          : 'border-transparent text-gray-400 hover:bg-gray-900 hover:text-white'
                      }`}
                    >
                      <tab.icon size={18} className={`mr-3 ${isActive ? 'text-[#a98a66]' : 'text-gray-400'}`} />
                      {tab.label}
                    </button>
                  );
                })}
              </nav>
            </div>

            <div className="p-6 border-t border-gray-800">
              <div className="flex items-center space-x-3">
                <div className="w-8 h-8 rounded bg-[#a98a66] flex items-center justify-center text-white font-bold">
                  GM
                </div>
                <div>
                  <p className="text-sm font-bold text-white">Admin User</p>
                  <p className="text-xs text-gray-500">Settings</p>
                </div>
              </div>
            </div>
          </div>

          {/* Main Content */}
          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
            {/* Top Header */}
            <header className="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 sm:px-6 z-10">
              <div className="flex items-center">
                <button 
                  className="md:hidden text-gray-500 hover:text-black mr-4"
                  onClick={() => setIsMobileMenuOpen(true)}
                >
                  <Menu size={24} />
                </button>
                <h2 className="text-xl font-semibold text-black capitalize">
                  {tabs.find(t => t.id === activeTab)?.label}
                </h2>
              </div>
              
              <div className="flex items-center space-x-4">
                <button className="text-gray-400 hover:text-[#a98a66] transition-colors relative">
                  <Bell size={20} />
                  <span className="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 transform translate-x-1/2 -translate-y-1/2"></span>
                </button>
                <button className="text-gray-400 hover:text-[#a98a66] transition-colors">
                  <Settings size={20} />
                </button>
              </div>
            </header>

            {/* Scrollable Main Area */}
            <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
              <div className="max-w-7xl mx-auto">
                {renderContent()}
              </div>
            </main>
          </div>
        </div>
      );
    }

    // Render the Application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
